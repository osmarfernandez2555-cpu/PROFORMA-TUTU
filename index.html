<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proforma — Tutu Automotores</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;}

/* HEADER APP */
.app-header{background:#2c3e50;color:#fff;padding:16px 24px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 12px rgba(0,0,0,.3);position:sticky;top:0;z-index:100;}
.brand{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:1px;}
.brand span{color:#e74c3c;}
.sub{font-size:11px;opacity:.6;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.btn-pdf{background:#c0392b;color:#fff;border:none;padding:10px 24px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.2s;margin-left:auto;}
.btn-pdf:hover{background:#96281b;}
.btn-pdf:disabled{background:#999;cursor:not-allowed;}

/* FORM */
.container{max-width:860px;margin:28px auto;padding:0 16px 60px;}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:20px;overflow:hidden;}
.ch{background:#2c3e50;color:#fff;padding:12px 20px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:10px;}
.dot{width:8px;height:8px;background:#e74c3c;border-radius:50%;}
.cb{padding:20px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media(max-width:600px){.g2,.g3{grid-template-columns:1fr;}}
.f{display:flex;flex-direction:column;gap:5px;}
.f.s2{grid-column:span 2;}
@media(max-width:600px){.f.s2{grid-column:span 1;}}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#7f8c8d;}
.req{color:#e74c3c;}
input,select,textarea{border:1.5px solid #dde1e7;border-radius:6px;padding:9px 12px;font-family:'Barlow',sans-serif;font-size:14px;color:#1a1a2e;background:#fff;width:100%;transition:.2s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#c0392b;box-shadow:0 0 0 3px rgba(192,57,43,.1);}
textarea{resize:vertical;min-height:70px;}
select{appearance:none;cursor:pointer;}
.toggle{display:flex;border:1.5px solid #dde1e7;border-radius:6px;overflow:hidden;}
.toggle input[type=radio]{display:none;}
.toggle label{flex:1;text-align:center;padding:9px 6px;cursor:pointer;font-size:13px;font-weight:600;letter-spacing:0;text-transform:none;color:#1a1a2e;transition:.15s;border-right:1.5px solid #dde1e7;}
.toggle label:last-child{border-right:none;}
.toggle input[type=radio]:checked+label{background:#c0392b;color:#fff;}

/* FOTOS */
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:500px){.foto-grid{grid-template-columns:repeat(2,1fr);}}
.fslot{aspect-ratio:16/10;border:2px dashed #dde1e7;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#fafafa;cursor:pointer;transition:.2s;}
.fslot:hover{border-color:#c0392b;background:#fef9f9;}
.fslot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:3;}
.fph{text-align:center;padding:8px;pointer-events:none;}
.fph svg{opacity:.3;display:block;margin:0 auto 6px;}
.fph p{font-size:10px;color:#999;font-weight:500;line-height:1.3;}
.fslot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.fslot .flbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:9px;text-align:center;padding:3px;font-weight:600;}
.fslot .xbtn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:12px;z-index:10;}
.fslot:hover .xbtn{display:flex;}

/* TOTALES */
.tbox{background:#f8f9fa;border:1.5px solid #dde1e7;border-radius:8px;padding:16px 20px;}
.tr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #dde1e7;font-size:14px;}
.tr:last-child{border-bottom:none;}
.tr .l{color:#7f8c8d;font-weight:500;}
.tr .r{font-weight:600;}
.tr.big .l{font-size:16px;font-weight:700;color:#1a1a2e;}
.tr.big .r{font-size:18px;font-weight:800;color:#c0392b;}

/* PREVIEW PROFORMA (oculto, se renderiza para PDF) */
#preview{position:fixed;left:-9999px;top:0;width:794px;background:#fff;font-family:Arial,sans-serif;font-size:12px;color:#1a1a2e;}
.pv-header{background:#c0392b;color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;}
.pv-header .hl{font-size:20px;font-weight:700;}
.pv-header .hs{font-size:10px;opacity:.75;margin-top:3px;}
.pv-header .hr{text-align:right;}
.pv-header .hn{font-size:22px;font-weight:700;}
.pv-sep{height:4px;background:#2c3e50;}
.pv-body{padding:16px 20px;}
.pv-sec{margin-bottom:14px;}
.pv-sec-title{background:#2c3e50;color:#fff;font-size:10px;font-weight:700;letter-spacing:2px;padding:5px 10px;margin-bottom:8px;}
.pv-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.pv-field{flex:1;min-width:120px;}
.pv-field.w2{flex:2;}
.pv-field.w3{flex:3;}
.pv-label{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.pv-val{font-size:11px;font-weight:700;color:#1a1a2e;border-bottom:1px solid #eee;padding-bottom:2px;}
.pv-auto-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee;}
.pv-auto-name{font-size:13px;font-weight:700;color:#c0392b;}
.pv-auto-price{font-size:16px;font-weight:800;}
.pv-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:6px;}
.pv-prices{margin-left:auto;width:260px;}
.pv-pr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee;font-size:11px;}
.pv-pr .pl{color:#888;}
.pv-pr .pv{font-weight:700;}
.pv-pr.ptotal{padding:8px 0;border-bottom:none;}
.pv-pr.ptotal .pl{font-size:14px;font-weight:700;color:#1a1a2e;}
.pv-pr.ptotal .pv{font-size:16px;font-weight:800;color:#c0392b;}
.pv-letras{font-size:10px;color:#555;margin:8px 0;padding:6px;background:#f9f9f9;border-left:3px solid #c0392b;}
.pv-avisos{margin-top:14px;padding-top:10px;border-top:1px solid #ddd;}
.pv-aviso{font-size:9px;color:#888;margin-bottom:3px;}
.pv-firma{text-align:right;margin-top:16px;padding-top:8px;border-top:1px solid #1a1a2e;display:inline-block;float:right;}
.pv-firma-name{font-size:11px;font-weight:700;}
.pv-firma-cuit{font-size:9px;color:#888;}
.pv-dni-header{background:#c0392b;color:#fff;padding:12px 20px;display:flex;justify-content:space-between;}
.pv-dni-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px;}
.pv-dni-slot{border:1px solid #ddd;border-radius:4px;overflow:hidden;}
.pv-dni-slot img{width:100%;height:120px;object-fit:cover;display:block;}
.pv-dni-slot .pv-dni-lbl{background:#2c3e50;color:#fff;font-size:9px;text-align:center;padding:3px;font-weight:700;}
.pv-tit{background:#f0f0f0;padding:4px 8px;font-size:9px;font-weight:700;color:#c0392b;text-transform:uppercase;letter-spacing:1px;margin-top:8px;}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:#2c3e50;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.25);opacity:0;transform:translateY(10px);transition:.3s;z-index:9999;pointer-events:none;max-width:320px;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.err{background:#c0392b;}
</style>
</head>
<body>

<header class="app-header">
  <div>
    <div class="brand">TUTU <span>AUTOMOTORES</span></div>
    <div class="sub">Generador de Proforma</div>
  </div>
  <button class="btn-pdf" id="btnPDF" onclick="generarPDF()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    GENERAR PDF
  </button>
</header>

<div class="container">

  <div class="card">
    <div class="ch"><div class="dot"></div>TIPO DE OPERACION</div>
    <div class="cb">
      <div class="g3">
        <div class="f">
          <label>Tipo de IVA <span class="req">*</span></label>
          <div class="toggle">
            <input type="radio" name="iva" id="i21" value="21" checked onchange="recalc()">
            <label for="i21">IVA 21%</label>
            <input type="radio" name="iva" id="i105" value="10.5" onchange="recalc()">
            <label for="i105">IVA 10.5%</label>
          </div>
        </div>
        <div class="f"><label>N° Proforma <span class="req">*</span></label><input type="number" id="nro" placeholder="45993"></div>
        <div class="f"><label>Fecha <span class="req">*</span></label><input type="date" id="fecha"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="ch"><div class="dot"></div>EMPRESA EMISORA</div>
    <div class="cb">
      <div class="g2">
        <div class="f"><label>Razon Social <span class="req">*</span></label><input type="text" id="empresa" value="TUTU AUTOMOTORES SAS"></div>
        <div class="f"><label>CUIT Empresa</label><input type="text" id="cuitEmp" value="30-71660684-4"></div>
        <div class="f"><label>Condicion IVA</label><input type="text" id="condiva" value="RESPONSABLE INSCRIPTO"></div>
        <div class="f"><label>Tipo Factura</label>
          <select id="tipoFact"><option>B</option><option>A</option><option>C</option></select>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="ch"><div class="dot"></div>DATOS DEL CLIENTE</div>
    <div class="cb">
      <div class="g2">
        <div class="f s2"><label>Nombre / Razon Social <span class="req">*</span></label><input type="text" id="cliente" placeholder="Apellido y nombre"></div>
        <div class="f"><label>CUIT / DNI</label><input type="text" id="cuitCli" placeholder="20-XXXXXXXX-X"></div>
        <div class="f"><label>Estado Civil</label>
          <select id="ecivil"><option>SOLTERO/A</option><option>CASADO/A</option><option>DIVORCIADO/A</option><option>VIUDO/A</option></select>
        </div>
        <div class="f s2"><label>Direccion</label><input type="text" id="dir" placeholder="Calle, numero, ciudad"></div>
        <div class="f"><label>Telefono</label><input type="tel" id="tel" placeholder="3541000000"></div>
        <div class="f"><label>Facturacion</label>
          <select id="fact"><option>B</option><option>A</option><option>C</option></select>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="ch"><div class="dot"></div>OPERACION / FINANCIACION</div>
    <div class="cb">
      <div class="f"><label>Descripcion <span class="req">*</span></label><input type="text" id="oper" placeholder="Ej: CREDITO - GALICIA $19.064.000"></div>
    </div>
  </div>

  <div class="card">
    <div class="ch"><div class="dot"></div>DATOS DEL VEHICULO</div>
    <div class="cb">
      <div class="g2">
        <div class="f"><label>Marca <span class="req">*</span></label><input type="text" id="marca" placeholder="RENAULT"></div>
        <div class="f"><label>Modelo <span class="req">*</span></label><input type="text" id="modelo" placeholder="KWID OUTSIDER"></div>
        <div class="f"><label>Año</label><input type="number" id="anio" placeholder="2025"></div>
        <div class="f"><label>Tipo</label><input type="text" id="tipo" placeholder="HATCHBACK 5P"></div>
        <div class="f"><label>Procedencia</label><input type="text" id="proc" placeholder="ARGENTINA"></div>
        <div class="f"><label>Color</label><input type="text" id="color" placeholder="BLANCO GLACIAR"></div>
        <div class="f"><label>Chasis</label><input type="text" id="chasis" placeholder="N° de chasis"></div>
        <div class="f"><label>Motor</label><input type="text" id="motor" placeholder="N° de motor"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="ch"><div class="dot"></div>PRECIO</div>
    <div class="cb" style="display:flex;flex-direction:column;gap:16px;">
      <div class="g3">
        <div class="f"><label>Precio Total con IVA <span class="req">*</span></label><input type="number" id="precio" placeholder="34000000" oninput="recalc()"></div>
        <div class="f"><label>Validez (dias)</label><input type="number" id="validez" value="10"></div>
        <div class="f"><label>Patentamiento</label>
          <select id="patente"><option value="no">NO incluye</option><option value="si">SI incluye</option></select>
        </div>
      </div>
      <div class="tbox">
        <div class="tr"><span class="l">Valor Neto S/IVA</span><span class="r" id="tneto">$0</span></div>
        <div class="tr"><span class="l" id="tivalbl">IVA 21%</span><span class="r" id="tiva">$0</span></div>
        <div class="tr big"><span class="l">TOTAL</span><span class="r" id="ttotal">$0</span></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="ch"><div class="dot"></div>FOTOS DE DNI (hasta 3 titulares)</div>
    <div class="cb">
      <div class="foto-grid" id="fgrid"></div>
      <p style="font-size:11px;color:#aaa;margin-top:12px;">Carga frente y dorso del DNI de cada titular. Se incluyen en el PDF.</p>
    </div>
  </div>

  <div class="card">
    <div class="ch"><div class="dot"></div>OBSERVACIONES</div>
    <div class="cb">
      <div class="f"><label>Texto adicional (opcional)</label><textarea id="obs" rows="3" placeholder="Aclaraciones, accesorios, etc."></textarea></div>
    </div>
  </div>

</div>

<!-- PREVIEW OCULTO PARA PDF -->
<div id="preview"></div>

<div id="toast"></div>

<script>
const FLABELS = [
  'DNI Titular 1 - Frente','DNI Titular 1 - Dorso',
  'DNI Titular 2 - Frente','DNI Titular 2 - Dorso',
  'DNI Titular 3 - Frente','DNI Titular 3 - Dorso'
];
const fotos = {};

// ── INIT FOTOS ──
function initFotos() {
  var grid = document.getElementById('fgrid');
  grid.innerHTML = '';
  for (var i = 0; i < 6; i++) {
    (function(idx) {
      var slot = document.createElement('div');
      slot.className = 'fslot';
      slot.id = 'fs' + idx;

      var inp = document.createElement('input');
      inp.type = 'file';
      inp.accept = 'image/*';
      inp.addEventListener('change', function() {
        if (this.files && this.files[0]) cargarFoto(idx, this.files[0]);
      });

      var ph = document.createElement('div');
      ph.className = 'fph';
      ph.innerHTML = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><p>' + FLABELS[idx] + '</p>';

      var xbtn = document.createElement('button');
      xbtn.className = 'xbtn';
      xbtn.type = 'button';
      xbtn.textContent = '×';
      xbtn.addEventListener('click', function(e) {
        e.preventDefault(); e.stopPropagation();
        removerFoto(idx);
      });

      var lbl = document.createElement('div');
      lbl.className = 'flbl';
      lbl.textContent = FLABELS[idx];

      slot.appendChild(inp);
      slot.appendChild(ph);
      slot.appendChild(xbtn);
      slot.appendChild(lbl);
      grid.appendChild(slot);
    })(i);
  }
}

function cargarFoto(idx, file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    fotos[idx] = e.target.result;
    var slot = document.getElementById('fs' + idx);
    var img = slot.querySelector('img');
    if (!img) { img = document.createElement('img'); slot.insertBefore(img, slot.querySelector('.flbl')); }
    img.src = e.target.result;
    slot.querySelector('.fph').style.display = 'none';
    slot.querySelector('.xbtn').style.display = 'flex';
  };
  reader.readAsDataURL(file);
}

function removerFoto(idx) {
  delete fotos[idx];
  var slot = document.getElementById('fs' + idx);
  var img = slot.querySelector('img');
  if (img) img.remove();
  slot.querySelector('.fph').style.display = '';
  slot.querySelector('.xbtn').style.display = 'none';
  slot.querySelector('input[type=file]').value = '';
}

// ── RECALCULAR ──
function recalc() {
  var total = parseFloat(document.getElementById('precio').value) || 0;
  var pct = parseFloat(document.querySelector('input[name="iva"]:checked').value) / 100;
  var neto = total / (1 + pct);
  var iva = total - neto;
  document.getElementById('tneto').textContent = fmt(neto);
  document.getElementById('tivalbl').textContent = 'IVA ' + Math.round(pct * 100) + '%';
  document.getElementById('tiva').textContent = fmt(iva);
  document.getElementById('ttotal').textContent = fmt(total);
}

function fmt(n) { return '$' + Math.round(n).toLocaleString('es-AR'); }
function fmtN(n) { return Math.round(n).toLocaleString('es-AR'); }

function gv(id) {
  var el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

// ── NUMERO EN LETRAS ──
function enLetras(n) {
  try {
    n = Math.round(n);
    if (!n || isNaN(n)) return 'CERO';
    var U=['','UN','DOS','TRES','CUATRO','CINCO','SEIS','SIETE','OCHO','NUEVE','DIEZ','ONCE','DOCE','TRECE','CATORCE','QUINCE','DIECISEIS','DIECISIETE','DIECIOCHO','DIECINUEVE','VEINTE'];
    var D=['','','VEINTE','TREINTA','CUARENTA','CINCUENTA','SESENTA','SETENTA','OCHENTA','NOVENTA'];
    var C=['','CIENTO','DOSCIENTOS','TRESCIENTOS','CUATROCIENTOS','QUINIENTOS','SEISCIENTOS','SETECIENTOS','OCHOCIENTOS','NOVECIENTOS'];
    function d2(x){if(x<=20)return U[x];if(x<30)return 'VEINTI'+U[x-20];return D[Math.floor(x/10)]+(x%10?' Y '+U[x%10]:'');}
    function d3(x){if(x===100)return 'CIEN';return C[Math.floor(x/100)]+(x%100?' '+d2(x%100):'');}
    function d6(x){if(x<100)return d2(x);if(x<1000)return d3(x);var m=Math.floor(x/1000),r=x%1000;return(m===1?'MIL':d6(m)+' MIL')+(r?' '+d6(r):'');}
    if(n<1000000)return d6(n);
    var m=Math.floor(n/1000000),r=n%1000000;
    return(m===1?'UN MILLON':d6(m)+' MILLONES')+(r?' '+d6(r):'');
  } catch(e){return '';}
}

// ── TOAST ──
function toast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isErr ? ' err' : '');
  setTimeout(function(){ t.className = ''; }, 3500);
}

// ── CONSTRUIR HTML PROFORMA PARA RENDERIZAR ──
function buildPreview() {
  var pct = parseFloat(document.querySelector('input[name="iva"]:checked').value);
  var total = parseFloat(gv('precio')) || 0;
  var neto = total / (1 + pct/100);
  var iva = total - neto;
  var fechaRaw = gv('fecha');
  var fecha = fechaRaw ? new Date(fechaRaw + 'T00:00:00').toLocaleDateString('es-AR') : new Date().toLocaleDateString('es-AR');
  var validez = gv('validez') || '10';
  var patente = gv('patente') === 'si' ? 'SI INCLUYE PATENTAMIENTO.' : 'NO INCLUYE PATENTAMIENTO.';

  function row(label, val) {
    return '<div class="pv-field"><div class="pv-label">'+label+'</div><div class="pv-val">'+(val||'—')+'</div></div>';
  }
  function row2(label, val) {
    return '<div class="pv-field w2"><div class="pv-label">'+label+'</div><div class="pv-val">'+(val||'—')+'</div></div>';
  }

  var dniPages = '';
  var dniKeys = [];
  for (var k in fotos) { if (fotos.hasOwnProperty(k)) dniKeys.push(parseInt(k)); }
  dniKeys.sort();

  if (dniKeys.length > 0) {
    var dniItems = '';
    var currentTit = -1;
    for (var di = 0; di < dniKeys.length; di++) {
      var ki = dniKeys[di];
      var titNum = Math.floor(ki / 2) + 1;
      if (titNum !== currentTit) {
        if (currentTit !== -1) dniItems += '</div>';
        dniItems += '<div class="pv-tit">TITULAR ' + titNum + '</div><div class="pv-dni-grid" style="padding:8px 20px;">';
        currentTit = titNum;
      }
      dniItems += '<div class="pv-dni-slot"><div class="pv-dni-lbl">' + FLABELS[ki] + '</div><img src="' + fotos[ki] + '"></div>';
    }

// ── GENERAR PDF ──
async function generarPDF() {
  if (!gv('cliente')) { toast('Falta el nombre del cliente', true); return; }
  if (!gv('precio') || parseFloat(gv('precio')) <= 0) { toast('Ingresa el precio total', true); return; }
  if (!gv('marca') || !gv('modelo')) { toast('Falta marca o modelo', true); return; }

  var btn = document.getElementById('btnPDF');
  btn.disabled = true;
  btn.textContent = 'Generando...';
  toast('Generando PDF, espera...');

  try {
    // Construir preview
    var preview = document.getElementById('preview');
    preview.innerHTML = buildPreview();

    // Esperar a que las imágenes carguen
    var imgs = preview.querySelectorAll('img');
    await Promise.all(Array.from(imgs).map(function(img) {
      return new Promise(function(resolve) {
        if (img.complete) resolve();
        else { img.onload = resolve; img.onerror = resolve; }
      });
    }));

    // Render con html2canvas
    var canvas = await html2canvas(preview, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false
    });

    var imgData = canvas.toDataURL('image/jpeg', 0.92);
    var imgW = canvas.width;
    var imgH = canvas.height;

    // Crear PDF
    var { jsPDF } = window.jspdf;
    var pdf = new jsPDF({ unit: 'px', format: 'a4', orientation: 'portrait' });
    var pageW = pdf.internal.pageSize.getWidth();
    var pageH = pdf.internal.pageSize.getHeight();
    var ratio = pageW / imgW;
    var totalH = imgH * ratio;

    // Agregar páginas según altura
    var posY = 0;
    while (posY < totalH) {
      if (posY > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, -posY, pageW, totalH);
      posY += pageH;
    }

    var nombre = gv('cliente').replace(/[^a-zA-Z0-9]/g, '_').substring(0, 20);
    var nro = gv('nro') || 'SN';
    pdf.save('Proforma_' + nro + '_' + nombre + '.pdf');

    toast('PDF generado correctamente');
  } catch(err) {
    console.error(err);
    toast('Error: ' + (err.message || String(err)), true);
  }

  btn.disabled = false;
  btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg> GENERAR PDF';
}
